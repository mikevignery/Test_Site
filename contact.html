<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Vignery's Pools</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <img src="https://github.com/mikevignery/Test_Site/blob/main/logo.png?raw=true" alt="Vignery's Pools logo" />
    </a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1 class="h1-white">Contact</h1>
      <p class="p-white">Contact us today for your free estimate.</p>
    </section>

    <section class="section two-column">
    <div class="contact-section">
  <h2>Contact Us</h2>
  <p>Have a question or need pool service? Send us a message below.</p>

  <form action="https://formspree.io/f/mjgqawbe" method="POST" class="contact-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>
 
    <div class="map-section">
  <h2>Service Area</h2>
  <p>Located in Huntersville, NC 28078</p>

  <div class="map-container">
    <iframe
      src="https://www.google.com/maps?q=Huntersville,%20NC%2028078&output=embed"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</div>
    </section>
    <section class="banner">
      <h2>Simple service. Clear water. Better pool days.</h2>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Vignery's Pools. All rights reserved.</p>
  </footer>
</body>
</html>
